{% extends "base.html" %}
{% block title %}Add expense · Ledger{% endblock %}
{% block page_title %}Add expense{% endblock %}

{% block content %}
<section class="panel panel-narrow">
  <form method="POST" class="stack-form">
    <label for="amount">Amount (₹)</label>
    <input type="number" id="amount" name="amount" step="0.01" min="0.01" required autofocus>

    <label for="category">Category</label>
    <select id="category" name="category" required>
      {% for c in categories %}
      <option value="{{ c }}">{{ c }}</option>
      {% endfor %}
    </select>

    <label for="description">Description (optional)</label>
    <input type="text" id="description" name="description" placeholder="e.g. Lunch with friends">

    <label for="date">Date</label>
    <input type="date" id="date" name="date" value="{{ today }}" required>

    <div class="form-actions">
      <a href="{{ url_for('expenses_list') }}" class="btn-ghost">Cancel</a>
      <button type="submit" class="btn-primary">Save expense</button>
    </div>
  </form>
</section>
{% endblock %}
