{% extends "base.html" %}
{% block title %}Sign up · Ledger{% endblock %}
{% block guest_content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-brand">
      <span class="brand-mark">$</span>
      <span class="brand-text">Ledger</span>
    </div>
    <p class="auth-tagline">Open a free account in a few seconds.</p>

    <form method="POST" class="auth-form">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" required autofocus>

      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" required minlength="6">

      <label for="confirm_password">Confirm password</label>
      <input type="password" id="confirm_password" name="confirm_password" required minlength="6">

      <button type="submit" class="btn-primary">Create account</button>
    </form>

    <p class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Log in</a></p>
  </div>
</div>
{% endblock %}
